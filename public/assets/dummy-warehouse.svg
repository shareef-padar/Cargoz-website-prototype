<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Warehouse placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E4E8ED"/>
      <stop offset="100%" stop-color="#CBD5E1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <!-- Floor -->
  <rect y="640" width="1200" height="160" fill="#94A3B8"/>
  <!-- Building body -->
  <rect x="200" y="240" width="800" height="400" fill="#CBD5E1" stroke="#62748E" stroke-width="3"/>
  <!-- Roof -->
  <polygon points="180,240 600,120 1020,240" fill="#62748E"/>
  <!-- Roller door -->
  <rect x="500" y="380" width="200" height="260" fill="#314158"/>
  <g stroke="#62748E" stroke-width="2">
    <line x1="500" y1="420" x2="700" y2="420"/>
    <line x1="500" y1="460" x2="700" y2="460"/>
    <line x1="500" y1="500" x2="700" y2="500"/>
    <line x1="500" y1="540" x2="700" y2="540"/>
    <line x1="500" y1="580" x2="700" y2="580"/>
  </g>
  <!-- Side windows -->
  <g fill="#94A3B8">
    <rect x="260" y="320" width="80" height="60"/>
    <rect x="380" y="320" width="80" height="60"/>
    <rect x="740" y="320" width="80" height="60"/>
    <rect x="860" y="320" width="80" height="60"/>
  </g>
  <!-- Pallet -->
  <g fill="#7957FF" opacity="0.85">
    <rect x="280" y="560" width="120" height="80"/>
    <rect x="280" y="640" width="120" height="6"/>
  </g>
  <!-- Label -->
  <text x="600" y="740" text-anchor="middle" font-family="Lato, system-ui, sans-serif" font-size="22" fill="#314158" font-weight="700" letter-spacing="2">WAREHOUSE PLACEHOLDER</text>
</svg>
